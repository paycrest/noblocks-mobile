// Top-level build file where you can add configuration options common to all sub-projects/modules.

// Override the KSP version that expo-modules-core (ExpoModulesCorePlugin.gradle)
// would otherwise pick from its hardcoded Kotlin → KSP map. Required because the
// Kotlin Gradle plugin below is 2.2.21, but Expo's default KSP is 2.0.21-1.0.28.
ext.kspVersion = "2.2.21-2.0.5"

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath 'com.android.tools.build:gradle:8.9.1'
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:2.2.21')
  }
}

def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url(reactNativeAndroidDir)
    }

    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
